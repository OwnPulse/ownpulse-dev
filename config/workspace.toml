# OwnPulse workspace configuration.
# To extend for hosted/private use, create a workspace.override.toml alongside this file.

[workspace]
name = "ownpulse"
default_org = "ownpulse"
default_branch = "main"
clone_root = "~/dev/ownpulse"

[agents]
definitions_path = "../agents"

[[repo]]
name = "ownpulse"
description = "Main application — backend, web frontend, iOS"
visibility = "public"
agents = ["rust-backend", "react-frontend", "swift-ios", "code-review", "security-review", "principles-guardian"]

[[repo]]
name = "ownpulse-infra"
description = "Infrastructure — OpenTofu, Helm charts, Ansible"
visibility = "private"
agents = ["k8s-infra", "security-review"]

[[repo]]
name = "ownpulse-web"
description = "Public marketing site — Astro"
visibility = "public"
agents = ["astro-web", "code-review"]

[[repo]]
name = "ownpulse-dev"
description = "This tool — workspace bootstrapper and agent definitions"
visibility = "public"
agents = ["code-review"]

[[repo]]
name = "gh-actions"
description = "Shared GitHub Actions — reusable composite actions for CI/CD"
visibility = "public"
agents = ["code-review"]
